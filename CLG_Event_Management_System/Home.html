<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        .hero-wrapper {
            position: relative;
            width: 100%;
            overflow: hidden;
            border-radius: 1rem;
            box-shadow: 0 0.75rem 1.5rem rgba(0, 0, 0, 0.12);
        }

        .hero-image {
            width: 100%;
            height: auto;
            display: block;
            object-fit: cover;
        }

        .hero-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.35);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #fff;
            padding: 2rem;
            text-align: center;
        }

        .hero-overlay h1 {
            text-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.6);
        }

        .hero-overlay .lead {
            max-width: 720px;
            text-shadow: 0 0.25rem 0.5rem rgba(0, 0, 0, 0.5);
        }

        .hero-buttons {
            display: flex;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
            margin-top: 1.5rem;
        }

        .hero-buttons .btn {
            min-width: 140px;
        }

        @media (min-width: 768px) {
            .hero-wrapper {
                max-height: 520px;
            }
        }

        @media (min-width: 1200px) {
            .hero-wrapper {
                max-height: 650px;
            }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container-fluid justify-content-center">
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-center" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="#">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">About</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="events.html">Events</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="contact.html">Contact</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container mt-5">
        <div class="hero-wrapper mx-auto">
            <img src="eventBanner.png" alt="Event Image" class="img-fluid hero-image">
            <div class="hero-overlay">
                <h1 class="mb-3">Event Highlights</h1>
                <p class="lead mb-2">Discover the latest events and activities happening in our community.</p>
                <p class="lead">For more information about our events, please visit the Events page.</p>
                <div class="hero-buttons">
                    <a class="btn btn-primary" href="events.html">View Events</a>
                    <a class="btn btn-secondary" href="contact.html">Register</a>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
