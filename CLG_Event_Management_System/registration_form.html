<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</head>
<body>
    <div class="container mt-5">
        <h2 class="mb-4">Event Registration Form</h2>
        <form id="registrationForm" onsubmit="store()">
            <div class="mb-3">
                <label for="fullName" class="form-label">Full Name</label>
                <input type="text" class="form-control" id="fullName" placeholder="Enter your full name" required>
            </div>
            <div class="mb-3">
                <label for="rollNumber" class="form-label">Roll Number</label>
                <input type="text" class="form-control" id="rollNumber" placeholder="Enter your roll number" required>
            </div>
            <div class="mb-3">
                <label for="email" class="form-label">Email address</label>
                <input type="email" class="form-control" id="email" placeholder="Enter your email" required>
            </div>
            <div class="mb-3">
                <label for="branch" class="form-label">Branch</label>
                <select class="form-select" id="branch">
                    <option selected>Select your branch</option>
                    <option value="1">Computer Science</option>
                    <option value="2">Mechanical Engineering</option>
                    <option value="3">Electrical Engineering</option>
                    <option value="4">Civil Engineering</option>
                    <option value="5">Chemical Engineering</option>
                </select>
            </div>
            <div class="mb-3">
                <label for="phone" class="form-label">Phone Number</label>
                <input type="tel" class="form-control" id="phone" placeholder="Enter your phone number">
            </div>
            <div class="mb-3">
                <label for="event" class="form-label">Select Event</label>
                <select class="form-control" id="event" required>
                    <option value="">Choose an event</option>
                    <option value="tech-symposium">Tech Symposium</option>
                    <option value="cultural-fest">Cultural Fest</option>
                    <option value="sports-meet">Sports Meet</option>
                    <option value="guest-lecture">Guest Lecture Series</option>
                    <option value="alumni-meet">Alumni Meet</option>
                    <option value="ai-workshop">Workshop on AI</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary">Register</button>
        </form>
        <script>
          function store(){
            const branchSelect=document.getElementById("branch");
            const branches=["Computer Science","Mechanical Engineering","Electrical Engineering","Civil Engineering","Chemical Engineering"];
            const registered_user={
                name:document.getElementById("fullName").value,
                roll_number:document.getElementById("rollNumber").value,
                email:document.getElementById("email").value,
                branch:branches[branchSelect.selectedIndex - 1],
                phone:document.getElementById("phone").value,
                event:document.getElementById("event").value
            }
            let registered_users=JSON.parse(localStorage.getItem("registered_users")) || [];
            registered_users.push(registered_user);
            localStorage.setItem("registered_users",JSON.stringify(registered_users));
            alert("Registration successful!");
          }
        </script>
    </div>
</body>
</html>
