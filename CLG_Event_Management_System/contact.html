<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <div class="container mt-5">
    <h1>Contact Us</h1>
    <form class="container mt-4">
        <label for="name" class="form-label">Name</label>
        <input type="text" class="form-control" id="name" placeholder="Enter your name">
        <label for="email" class="form-label">Email</label>
        <input type="email" class="form-control" id="email" placeholder="Enter your email">
        <label for="message" class="form-label">Message</label>     
        <textarea class="form-control" id="message" rows="3" placeholder="Enter your message"></textarea>
        <button type="submit" class="btn btn-primary mt-3">Submit</button>
    </form>
    <div class="container mt-5">
        <div class="row gy-4">
            <div class="col-lg-6">
                <div class="p-4 bg-light rounded">
                    <h2>Coordinator Details</h2>
                    <p class="mb-1"><strong>Name:</strong> Ms. Priya Sharma</p>
                    <p class="mb-1"><strong>Phone:</strong> +91 98765 43210</p>
                    <p class="mb-1"><strong>Email:</strong> coordinator@collegeevents.com</p>
                    <p class="mb-0"><strong>Office:</strong> Room 214, Administration Block</p>
                </div>
            </div>
            <div class="col-lg-6">
                <div class="p-4 bg-light rounded">
                    <h2>Connect with Us</h2>
                    <p>Follow our official pages for event updates and announcements.</p>
                    <div class="d-flex gap-3 flex-wrap">
                        <a href="#" class="btn btn-outline-primary">Facebook</a>
                        <a href="#" class="btn btn-outline-info">Twitter</a>
                        <a href="#" class="btn btn-outline-danger">Instagram</a>
                        <a href="#" class="btn btn-outline-secondary">LinkedIn</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
    </div>
</body>
</html>
