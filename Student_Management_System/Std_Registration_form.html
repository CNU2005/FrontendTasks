<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</head>
<body>
    <div class="container mt-5">
        <h2 class="mb-4">Student Registration Form</h2>
        <form onsubmit="return validateForm()">
            <div class="mb-3">
                <label for="fullName" class="form-label">Full Name</label>
                <input type="text" class="form-control" id="fullName" placeholder="Enter your full name" required>
            </div>
            <div class="mb-3">
                <label for="rollNumber" class="form-label">Roll Number</label>
                <input type="text" class="form-control" id="rollNumber" placeholder="Enter your roll number" required>
            </div>
            <div class="mb-3">
                <label for="email" class="form-label">Email address</label>
                <input type="email" class="form-control" id="email" placeholder="Example@gmail.com" required>
            </div>
            <div class="mb-3">
                <label for="fullName" class="form-label">Gender</label>
                <select class="form-select"  id="gender">
                    <option selected>Select your gender</option>
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                    <option value="other">Other</option>
                </select>
            </div>
            <div class="mb-3">
               
                <label for="branch" class="form-label">Branch</label>
                <select class="form-select" id="branch">
                    <option selected>Select your branch</option>
                    <option value="1">Computer Science</option>
                    <option value="2">Mechanical Engineering</option>
                    <option value="3">Electrical Engineering</option>
                    <option value="4">Civil Engineering</option>
                    <option value="5">Chemical Engineering</option>
                </select>



            </div>
            <div class="mb-3">
                <label for="dob" class="form-label">Date of Birth</label>
                <input type="date" class="form-control" id="dob" required>
            </div>
            <div class="mb-3">
                <label for="address" class="form-label">Address</label>
                <input type="text" class="form-control" id="address" placeholder="Enter your address" required>
            </div>
            <div class="mb-3">
                <label for="photo" class="form-label">Upload Photo</label>
                <input type="file" class="form-control" id="photo">
            </div>
            <div class="mb-3 form-check">
                <input type="checkbox" class="form-check-input" id="termsCheck" required>
                <label class="form-check-label" for="termsCheck">I agree to the terms and conditions</label>
            </div>
            <button type="submit" class="btn btn-primary">Register</button>
        </form>
        <script>
            function validateForm() {

                const std={
                    fullName: document.getElementById('fullName').value,
                    rollNumber: document.getElementById('rollNumber').value,
                    email: document.getElementById('email').value,
                    gender: document.getElementById('gender').value,
                    branch: document.getElementById('branch').value,
                    dob: document.getElementById('dob').value,
                    address: document.getElementById('address').value,
                    photo: document.getElementById('photo').value
                }
                let students1=JSON.parse(localStorage.getItem('students1')) || [];
                students1.push(std);
                localStorage.setItem('students1',JSON.stringify(students1));
                return false; 
            }
        </script>
</body>
</html>
