<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</head>
<body>
    <div class="container mt-5 d-flex justify-content-center">
    <div class="card" style="width: 18rem;">
        <img src="std.png" class="card-img-top rounded-circle" alt="Profile Picture" style="border-radius: 50%; object-fit: cover; margin: auto;">
        <div class="card-body text-center">
            <h3 class="card-title">Student Profile</h3>
        </div>
        <div class="card-body text-center">
            <h5 class="card-title">CNUVAS</h5>
            <p class="card-text">Roll Number: 5DW</p>
            <p class="card-text">Branch: Computer Science</p>
            <p class="card-text">Email:cnu@gmail.com</p>
            <a href="#" class="btn btn-primary">Edit Profile</a>    
        </div>
    </div>
</body>
</html>
