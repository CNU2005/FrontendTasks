<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</head>
<body>
    <div class="container-fluid mt-5">
        <div class="row align-items-center">

        <!-- Logo -->
        <div class="col-md-2 text-center text-md-start">
            <img src="logo.png" alt="Logo"
                 class="img-fluid"
                 style="max-width: 120px;">
        </div>

        <!-- Navbar -->
        <div class="col-md-8">
            <nav class="navbar navbar-expand-lg navbar-light">
                <div class="container-fluid">
                    <button class="navbar-toggler" type="button"
                            data-bs-toggle="collapse"
                            data-bs-target="#navbarNav">
                        <span class="navbar-toggler-icon"></span>
                    </button>

                    <div class="collapse navbar-collapse justify-content-center" id="navbarNav">
                        <ul class="navbar-nav gap-4">
                            <li class="nav-item">
                                <a class="nav-link active" href="HomePage.html">Home</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="about.html">About</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="courses.html">Courses</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="ContactUs.html">Contact</a>
                            </li>
                        </ul>
                    </div>
                </div>
            </nav>
        </div>

        <!-- Login/Register Button -->
        <div class="col-md-2 text-center text-md-end">
            <button class="btn btn-primary">Login</button>
        </div>

    </div>
        <div class="row p-5 gap-10 d-flex-row justify-content-center align-items-center text-center bg-light p-5 ">
            <div class="col-3 card p-3">
                <div class="card-body d-flex flex-column gap-3 bg-warning">
                    <h5 class="card-title">Total Students</h5>
                    <p class="card-text">100</p>
                </div>
            </div>
            <div class="col-3 card p-3">
                <div class="card-body d-flex flex-column gap-3 bg-success">
                    <h5 class="card-title">Present Students</h5>
                    <p class="card-text">90</p>
                </div>
            </div>
            <div class="col-3 card p-3">
                <div class="card-body d-flex flex-column gap-3 bg-danger">
                    <h5 class="card-title">Absent Students</h5>
                    <p class="card-text">10</p> 
                </div>
            </div>
            <div class="col-3 card p-3">
                <div class="card-body d-flex flex-column gap-3 bg-info">
                    <h5 class="card-title">Placements</h5>
                    <p class="card-text">70</p>
                </div>
            </div>
        </div>
    </div>
    <div class="table">
        <table class="table table-striped">
            
             <div class="input-group mb-3">
                <input type="text" class="form-control" placeholder="Search students..." aria-label="Search students" aria-describedby="button-search">
                <button class="btn btn-outline-secondary" type="button" id="button-search">Search</button>
                
            </div>
            <thead>
                <tr>
                    <th scope="col">#</th>
                    <th scope="col">Name</th>
                    <th scope="col">Roll Number</th>
                    <th scope="col">Branch</th>
                    <th scope="col">Attendance</th>
                    <th scope="col">View Profile</th>
                </tr>
            </thead>
            <tbody>

            </tbody>
        </table>


    </div>
    <script>
        let students=JSON.parse(localStorage.getItem('students1')) || [];
        let branches={
            1:"Computer Science",
            2:"Mechanical Engineering",
            3:"Electrical Engineering",
            4:"Civil Engineering",
            5:"Chemical Engineering"
        }
        students.forEach((student,index)=>{
            let table=document.querySelector('tbody');
            let row=table.insertRow();
            row.insertCell(0).innerText=index+1;
            row.insertCell(1).innerText=student.fullName;
            row.insertCell(2).innerText=student.rollNumber;
            row.insertCell(3).innerText=branches[student.branch];
            row.insertCell(4).innerText="Present";
            row.insertCell(5).innerHTML=`<a href="ProfileCard.html?rollNumber=${student.rollNumber}" class="btn btn-primary">View Profile</a>`;
        })
    </script>
</body>
</html>
